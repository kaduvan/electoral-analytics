<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TN Electoral Village Maps 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --bg: #f8f9fa;
    --panel: #ffffff;
    --border: #e0e0e0;
    --text: #333;
    --accent: #0066cc;
  }
  html, body { height: 100%; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  body { display: flex; flex-direction: column; }

  /* Top Bar */
  .topbar {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 8px 16px; display: flex; align-items: center; gap: 16px;
    flex-shrink: 0; z-index: 1000;
  }
  .topbar h1 { margin: 0; font-size: 16px; color: var(--text); white-space: nowrap; }
  .topbar select {
    padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
    font-size: 14px; min-width: 250px; cursor: pointer;
  }
  .topbar .stats {
    font-size: 12px; color: #666; display: flex; gap: 12px;
  }
  .topbar .stats span { white-space: nowrap; }

  /* Map Container */
  #map { flex: 1; background: #e8e8e8; }

  /* Controls Panel */
  .controls {
    position: absolute; top: 56px; left: 10px; z-index: 1000;
    background: var(--panel); padding: 10px 14px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 12px;
    max-height: calc(100vh - 70px); overflow-y: auto;
  }
  .controls h4 { margin: 0 0 8px 0; font-size: 13px; }
  .controls label { display: block; margin: 4px 0; cursor: pointer; }
  .controls .section { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }

  /* Legend with clickable items */
  .legend-panel {
    position: absolute; bottom: 30px; left: 10px; z-index: 1000;
    background: var(--panel); padding: 10px 14px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 12px;
  }
  .legend-panel h4 { margin: 0 0 6px 0; }
  .legend-item {
    display: flex; align-items: center; gap: 6px; margin: 4px 0;
    cursor: pointer; padding: 2px 4px; border-radius: 4px;
    transition: background 0.15s;
  }
  .legend-item:hover { background: #f0f0f0; }
  .legend-item.dimmed { opacity: 0.3; }
  .legend-swatch {
    width: 18px; height: 12px; border-radius: 2px; border: 1px solid #999;
    flex-shrink: 0;
  }
  .legend-count { color: #999; font-size: 11px; margin-left: auto; }

  /* Info Panel */
  .info-panel {
    position: absolute; top: 56px; right: 10px; z-index: 1000;
    background: var(--panel); padding: 12px 16px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); max-width: 320px; font-size: 13px;
    line-height: 1.5; max-height: calc(100vh - 70px); overflow-y: auto;
  }
  .info-panel h3 { margin: 0 0 6px 0; font-size: 15px; }
  .info-panel h4 { margin: 8px 0 4px 0; font-size: 13px; color: #666; }
  .info-panel table { width: 100%; border-collapse: collapse; margin: 4px 0; }
  .info-panel td { padding: 2px 6px; }
  .info-panel .bar { height: 6px; border-radius: 3px; }
  .swing-badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-weight: bold; font-size: 11px;
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <h1>TN Village Maps</h1>
  <select id="ac-select">
    <option value="nagercoil">Nagercoil (Kanniyakumari)</option>
<option value="thiruvarur">Thiruvarur (Thiruvarur)</option>
<option value="trichy-east">Trichy East (Tiruchirappalli)</option>

  </select>
  <div class="stats" id="ac-stats"></div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Layer Controls -->
<div class="controls">
  <h4>Layers</h4>
  <label><input type="radio" name="layer" value="margin" checked> Winner + Margin</label>
  <label><input type="radio" name="layer" value="blend"> Vote Share Blend</label>
  <label><input type="radio" name="layer" value="swing"> Swing 2021&rarr;2026</label>
  <label><input type="radio" name="layer" value="none"> No Shading</label>

  <div class="section" id="filter-section" style="display:none">
    <h4>Filter by Party</h4>
    <label><input type="checkbox" id="filter-all" checked> Show All</label>
    <div id="filter-party-list"></div>
  </div>
</div>

<!-- Info Panel -->
<div class="info-panel" id="info">
  <h3>Select a constituency</h3>
  <p style="margin:0;color:#666;">Choose from dropdown above</p>
</div>

<!-- Legend -->
<div class="legend-panel" id="legend">
  <h4>Legend</h4>
  <div style="font-size:11px;color:#666;">Loading...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// DATA
const AC_LIST = [
  {
    "name": "nagercoil",
    "district": "Kanniyakumari",
    "center": [
      8.18,
      77.43
    ],
    "zoom": 11,
    "has_2021": true,
    "villages_with_data": 22,
    "total_villages": 158,
    "winners_2026": {
      "DMK": 9,
      "BJP": 7,
      "TVK": 6
    },
    "winners_2021": {
      "BJP": 15,
      "DMK": 7
    },
    "flipped": 9,
    "active_parties": [
      "DMK",
      "BJP",
      "TVK"
    ],
    "geojson_file": "nagercoil.geojson",
    "geojson_size_mb": 0.9
  },
  {
    "name": "thiruvarur",
    "district": "Thiruvarur",
    "center": [
      10.77,
      79.63
    ],
    "zoom": 10,
    "has_2021": true,
    "villages_with_data": 111,
    "total_villages": 530,
    "winners_2026": {
      "DMK": 87,
      "TVK": 24
    },
    "winners_2021": {
      "BJP": 6,
      "DMK": 105
    },
    "flipped": 29,
    "active_parties": [
      "DMK",
      "TVK"
    ],
    "geojson_file": "thiruvarur.geojson",
    "geojson_size_mb": 2.7
  },
  {
    "name": "trichy-east",
    "district": "Tiruchirappalli",
    "center": [
      10.81,
      78.69
    ],
    "zoom": 12,
    "has_2021": true,
    "villages_with_data": 8,
    "total_villages": 497,
    "winners_2026": {
      "TVK": 8
    },
    "winners_2021": {
      "DMK": 8
    },
    "flipped": 8,
    "active_parties": [
      "TVK"
    ],
    "geojson_file": "trichy-east.geojson",
    "geojson_size_mb": 2.4
  }
];
const PARTY = {
  "DMK": {
    "color": "#E02020",
    "name": "DMK Alliance"
  },
  "BJP": {
    "color": "#FF8C00",
    "name": "BJP/ADMK Alliance"
  },
  "TVK": {
    "color": "#006400",
    "name": "TVK (Vijay)"
  },
  "NTK": {
    "color": "#800080",
    "name": "NTK (Seeman)"
  },
  "MNM": {
    "color": "#FF1493",
    "name": "MNM (Kamal)"
  },
  "PT": {
    "color": "#FF69B4",
    "name": "PT"
  },
  "TVuK": {
    "color": "#DAA520",
    "name": "TVuK"
  },
  "SDPI": {
    "color": "#228B22",
    "name": "SDPI"
  },
  "IND": {
    "color": "#808080",
    "name": "Independent"
  },
  "VVIP": {
    "color": "#4169E1",
    "name": "VVIP"
  },
  "AMMK": {
    "color": "#D2691E",
    "name": "AMMK"
  },
  "CPIML": {
    "color": "#CC0000",
    "name": "CPI(ML)"
  }
};
const AC_MAP = {};
AC_LIST.forEach(a => AC_MAP[a.name] = a);

// MAP STATE
var tileUrl = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
var tileAttrib = '&copy; OpenStreetMap';
var map = L.map('map').setView([10.5, 78.5], 7);
L.tileLayer(tileUrl, {attribution: tileAttrib, maxZoom: 18}).addTo(map);

var geojsonLayer = null;
var currentAC = null;
var currentLayer = 'margin';
var highlightedParty = null;
var geojsonData = null;

// COLOR HELPERS
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function marginColor(winner, margin) {
  var base = PARTY[winner] ? PARTY[winner].color : '#808080';
  var rgb = hexToRgb(base);
  var r = rgb[0], g = rgb[1], b = rgb[2];
  var alpha = 0.20 + 0.75 * Math.min(margin * 2, 1);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha.toFixed(2) + ')';
}

function blendColor(parties) {
  var r=0, g=0, b=0, total=0;
  var keys = Object.keys(parties);
  for (var i=0; i<keys.length; i++) {
    var party = keys[i];
    var share = parties[party];
    if (PARTY[party] && share > 0) {
      var rgb = hexToRgb(PARTY[party].color);
      r += rgb[0] * share; g += rgb[1] * share; b += rgb[2] * share;
      total += share;
    }
  }
  if (total === 0) return '#DDDDDD';
  return 'rgb(' + Math.round(r/total) + ',' + Math.round(g/total) + ',' + Math.round(b/total) + ')';
}

function swingColor(d) {
  if (!d.votes_2026 || !d.votes_2021) return '#DDDDDD';
  if (d.votes_2026.winner === d.votes_2021.winner) return '#DDDDDD';
  return PARTY[d.votes_2026.winner] ? PARTY[d.votes_2026.winner].color : '#808080';
}

// STYLING
function getStyle(feature) {
  var d = feature.properties;
  var v = d.votes_2026;
  var fillColor = '#DDDDDD';
  var fillOpacity = 0.3;

  if (highlightedParty !== null && v && v.winner !== highlightedParty) {
    fillColor = '#EEEEEE';
    fillOpacity = 0.1;
  } else if (currentLayer === 'margin' && v) {
    fillColor = marginColor(v.winner, v.margin);
    fillOpacity = 0.7;
  } else if (currentLayer === 'blend' && v) {
    var shares = {};
    var pkeys = Object.keys(v.parties);
    for (var j=0; j<pkeys.length; j++) shares[pkeys[j]] = v.parties[pkeys[j]].share;
    fillColor = blendColor(shares);
    fillOpacity = 0.65;
  } else if (currentLayer === 'swing') {
    fillColor = swingColor(d);
    fillOpacity = 0.7;
  } else {
    fillOpacity = 0.05;
  }

  return {
    fillColor: fillColor, color: '#555', weight: 0.5, opacity: 0.5, fillOpacity: fillOpacity
  };
}

// LOAD AC
function loadAC(acName) {
  var ac = AC_MAP[acName];
  if (!ac) return;
  currentAC = ac;
  highlightedParty = null;

  // Update stats bar
  var statsEl = document.getElementById('ac-stats');
  var stats = '<span>' + ac.villages_with_data + '/' + ac.total_villages + ' villages</span>';
  var w26 = ac.winners_2026;
  var sorted = Object.entries(w26).sort(function(a,b){ return b[1]-a[1]; });
  for (var i=0; i<sorted.length; i++) {
    var p = sorted[i][0], count = sorted[i][1];
    var c = PARTY[p] ? PARTY[p].color : '#808080';
    var n = PARTY[p] ? PARTY[p].name : p;
    stats += '<span style="color:' + c + ';font-weight:600">' + n + ': ' + count + '</span>';
  }
  if (ac.has_2021 && ac.flipped > 0) {
    stats += '<span style="color:#cc0000">Flipped: ' + ac.flipped + '</span>';
  }
  statsEl.innerHTML = stats;

  // Show/hide swing layer option
  var swingRadio = document.querySelector('input[value="swing"]');
  if (swingRadio) swingRadio.parentElement.style.display = ac.has_2021 ? '' : 'none';

  var filterSection = document.getElementById('filter-section');
  filterSection.style.display = (currentLayer === 'margin' || currentLayer === 'blend') ? '' : 'none';

  // Fetch GeoJSON
  fetch('data/' + acName + '.geojson')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      geojsonData = data;
      if (geojsonLayer) map.removeLayer(geojsonLayer);

      geojsonLayer = L.geoJSON(data, {
        style: getStyle,
        onEachFeature: function(feature, layer) {
          layer.on({
            mouseover: function(e) {
              e.target.setStyle({weight: 2.5, color: '#000'});
              updateInfo(feature);
            },
            mouseout: function(e) {
              geojsonLayer.resetStyle(e.target);
            },
            click: function(e) { updateInfo(feature); }
          });
        }
      }).addTo(map);

      map.setView(ac.center, ac.zoom);
      updateLegend();
      updateFilterList();
    });
}

// INFO PANEL
var info = document.getElementById('info');
function updateInfo(feature) {
  var d = feature.properties;
  var v26 = d.votes_2026;
  var v21 = d.votes_2021;

  var html = '<h3>' + d.village + '</h3>';
  html += '<span style="color:#666">' + (d.block || '') + ' block</span>';

  if (v26) {
    var wColor = PARTY[v26.winner] ? PARTY[v26.winner].color : '#808080';
    var wName = PARTY[v26.winner] ? PARTY[v26.winner].name : v26.winner;
    html += '<h4>2026: <span style="color:' + wColor + '">' + wName + '</span> (' + (v26.winner_share*100).toFixed(1) + '%)</h4>';
    html += '<table>';
    var psorted = Object.entries(v26.parties).sort(function(a,b){ return b[1].votes - a[1].votes; });
    for (var i=0; i<psorted.length; i++) {
      var pk = psorted[i][0], pv = psorted[i][1];
      if (pv.votes === 0) continue;
      var pc = PARTY[pk] ? PARTY[pk].color : '#808080';
      var pn = PARTY[pk] ? PARTY[pk].name : pk;
      html += '<tr><td style="color:' + pc + ';font-weight:bold">' + pn + '</td>';
      html += '<td>' + pv.votes.toLocaleString() + '</td>';
      html += '<td><div class="bar" style="width:' + (pv.share*100) + 'px;background:' + pc + '"></div></td>';
      html += '<td>' + (pv.share*100).toFixed(1) + '%</td></tr>';
    }
    html += '</table>';
  }

  if (v21) {
    var w2Color = PARTY[v21.winner] ? PARTY[v21.winner].color : '#808080';
    var w2Name = PARTY[v21.winner] ? PARTY[v21.winner].name : v21.winner;
    html += '<h4>2021: <span style="color:' + w2Color + '">' + w2Name + '</span> (' + (v21.winner_share*100).toFixed(1) + '%)</h4>';
  }

  if (v26 && v21) {
    var mc = (v26.margin - v21.margin) * 100;
    var arrow = mc > 0 ? '&#9650;' : mc < 0 ? '&#9660;' : '&#8594;';
    var clr = mc > 0 ? 'green' : mc < 0 ? 'red' : 'gray';
    html += '<div style="margin-top:6px;padding-top:6px;border-top:1px solid #ddd">';
    html += 'Margin: <span style="color:' + clr + ';font-weight:bold">' + arrow + ' ' + Math.abs(mc).toFixed(1) + 'pp</span>';
    if (v26.winner !== v21.winner) {
      html += ' <span class="swing-badge" style="background:#FFE0E0">FLIPPED</span>';
    }
    html += '</div>';
  }

  if (!v26) {
    html += '<p style="color:#999">No booth data matched</p>';
  }

  info.innerHTML = html;
}

// LEGEND (clickable)
function updateLegend() {
  var legend = document.getElementById('legend');
  if (!currentAC) return;
  var html = '<h4>Legend</h4>';

  if (currentLayer === 'margin') {
    html += '<div style="font-size:11px;color:#666;margin-bottom:6px">Click to filter by party</div>';
    var w26 = currentAC.winners_2026;
    var sorted = Object.entries(w26).sort(function(a,b){ return b[1]-a[1]; });
    for (var i=0; i<sorted.length; i++) {
      var p = sorted[i][0], count = sorted[i][1];
      var c = PARTY[p] ? PARTY[p].color : '#808080';
      var n = PARTY[p] ? PARTY[p].name : p;
      var dimClass = (highlightedParty !== null && highlightedParty !== p) ? 'dimmed' : '';
      html += '<div class="legend-item ' + dimClass + '" onclick="toggleFilter(\'' + p + '\')">';
      html += '<div class="legend-swatch" style="background:' + c + '"></div>';
      html += n + ' <span class="legend-count">' + count + '</span></div>';
    }
  } else if (currentLayer === 'blend') {
    html += '<div style="font-size:11px;color:#666">Color = vote share blend</div>';
    var w26b = currentAC.winners_2026;
    var sortedb = Object.entries(w26b).sort(function(a,b){ return b[1]-a[1]; });
    for (var i=0; i<sortedb.length; i++) {
      var p = sortedb[i][0];
      var c = PARTY[p] ? PARTY[p].color : '#808080';
      var n = PARTY[p] ? PARTY[p].name : p;
      html += '<div class="legend-item"><div class="legend-swatch" style="background:' + c + '"></div>' + n + '</div>';
    }
  } else if (currentLayer === 'swing') {
    html += '<div style="font-size:11px;color:#666;margin-bottom:4px">Flipped villages highlighted</div>';
    html += '<div class="legend-item"><div class="legend-swatch" style="background:#DDDDDD"></div>Held same</div>';
    html += '<div class="legend-item"><div class="legend-swatch" style="background:#E02020"></div>To DMK</div>';
    html += '<div class="legend-item"><div class="legend-swatch" style="background:#FF8C00"></div>To BJP/ADMK</div>';
    html += '<div class="legend-item"><div class="legend-swatch" style="background:#006400"></div>To TVK</div>';
  } else {
    html += '<div style="font-size:11px;color:#666">No shading</div>';
  }

  legend.innerHTML = html;
}

// FILTER (clickable legend)
function toggleFilter(party) {
  if (highlightedParty === party) {
    highlightedParty = null;
  } else {
    highlightedParty = party;
  }
  if (geojsonLayer) geojsonLayer.setStyle(getStyle);
  updateLegend();
  updateFilterCheckbox();
}

function updateFilterList() {
  var list = document.getElementById('filter-party-list');
  if (!currentAC) return;
  var w26 = currentAC.winners_2026;
  var sorted = Object.entries(w26).sort(function(a,b){ return b[1]-a[1]; });
  var html = '';
  for (var i=0; i<sorted.length; i++) {
    var p = sorted[i][0], count = sorted[i][1];
    var n = PARTY[p] ? PARTY[p].name : p;
    html += '<label><input type="checkbox" class="party-filter" value="' + p + '" checked> ' + n + ' (' + count + ')</label>';
  }
  list.innerHTML = html;
}

function updateFilterCheckbox() {
  document.getElementById('filter-all').checked = (highlightedParty === null);
}

// EVENT HANDLERS
document.getElementById('ac-select').addEventListener('change', function(e) {
  loadAC(e.target.value);
});

document.querySelectorAll('input[name="layer"]').forEach(function(radio) {
  radio.addEventListener('change', function(e) {
    currentLayer = e.target.value;
    highlightedParty = null;
    if (geojsonLayer) geojsonLayer.setStyle(getStyle);
    updateLegend();
  });
});

document.getElementById('filter-all').addEventListener('change', function(e) {
  highlightedParty = null;
  if (geojsonLayer) geojsonLayer.setStyle(getStyle);
  updateLegend();
});

// Load first AC on page load
if (AC_LIST.length > 0) {
  loadAC(AC_LIST[0].name);
  document.getElementById('ac-select').value = AC_LIST[0].name;
}
</script>
</body>
</html>
